user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    upstream app_upstream {
        server app:8000;
        keepalive 32;
    }

    upstream sso_proxy_upstream {
        server sso-proxy:8081;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

        location = /auth/sso/login {
            auth_request /_sso_auth;
            auth_request_set $sso_authenticate_header $upstream_http_www_authenticate;
            auth_request_set $sso_authenticated_user $upstream_http_x_authenticated_user;
            auth_request_set $sso_authenticated_principal $upstream_http_x_authenticated_principal;
            auth_request_set $sso_authenticated_email $upstream_http_x_authenticated_email;
            auth_request_set $sso_authenticated_name $upstream_http_x_authenticated_name;
            auth_request_set $sso_authenticated_groups $upstream_http_x_authenticated_groups;
            error_page 401 = @sso_negotiate;

            proxy_pass http://app_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Authorization "";
            proxy_set_header X-Authenticated-User $sso_authenticated_user;
            proxy_set_header X-Authenticated-Principal $sso_authenticated_principal;
            proxy_set_header X-Authenticated-Email $sso_authenticated_email;
            proxy_set_header X-Authenticated-Name $sso_authenticated_name;
            proxy_set_header X-Authenticated-Groups $sso_authenticated_groups;
            proxy_buffering off;
            proxy_read_timeout 3600;
            add_header WWW-Authenticate $sso_authenticate_header always;
        }

        location = /_sso_auth {
            internal;
            proxy_pass http://sso_proxy_upstream/validate;
            proxy_http_version 1.1;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI $request_uri;
        }

        location @sso_negotiate {
            add_header WWW-Authenticate $sso_authenticate_header always;
            return 401;
        }

        location / {
            proxy_pass http://app_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-Authenticated-Principal "";
            proxy_set_header X-Authenticated-Email "";
            proxy_set_header X-Authenticated-Name "";
            proxy_set_header X-Authenticated-Groups "";
            proxy_buffering off;
            proxy_read_timeout 3600;
        }
    }
}
